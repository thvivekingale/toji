          { n: 'D5', t: "Arms + core — Thick arms", s: 'Sat', wu: 'Wrist circles → light curls', ex: [ { n: 'Incline DB curl', m: 'Bi long head', s: '3', r: '10–12', rest: '75s', t: I, p: 1, note: 'Arms hang BEHIND body.' }, { n: 'Close-grip barbell curl', m: 'Bi long head', s: '3', r: '8–10', rest: '75s', t: C, p: 0, note: 'Close grip = long head.' }, { n: 'Wide-grip barbell curl', m: 'Bi short head', s: '3', r: '8–10', rest: '75s', t: C, p: 0, note: 'Builds visible mass.' }, { n: 'EZ preacher curl', m: 'Bi short head', s: '3', r: '10–12', rest: '60s', t: I, p: 0, note: 'No cheating possible.' }, { n: 'Cable curl', m: 'Peak contraction', s: '3', r: '12–15', rest: '60s', t: I, p: 0, note: 'Constant tension.' }, { n: 'Cross-body hammer curl', m: 'Brachialis', s: '3', r: '12 ea', rest: '60s', t: I, p: 0, note: 'Essential for Toji arm look.' }, { n: 'Close-grip bench press', m: 'Triceps mass', s: '3', r: '8–10', rest: '90s', t: C, p: 1, note: 'Heaviest compound for arms.' }, { n: 'Skull crushers', m: 'Tri long head', s: '3', r: '10–12', rest: '75s', t: I, p: 0, note: 'Elbows ceiling.' }, { n: 'Overhead cable extension', m: 'Tri long head', s: '3', r: '12–15', rest: '60s', t: I, p: 0, note: 'Maximum stretch.' }, { n: 'Rope pushdown', m: 'Tri lateral head', s: '3', r: '12–15', rest: '60s', t: I, p: 0, note: 'Split rope at bottom.' }, { n: 'DB wrist curl', m: 'Forearm flexors', s: '3', r: '15–20', rest: '45s', t: I, p: 0, note: 'Thick forearms.' }, { n: 'Reverse wrist curl', m: 'Forearm extensors', s: '2', r: '15–20', rest: '45s', t: I, p: 0, note: 'Balances flexor work.' }, { n: 'Hanging leg raises', m: 'Lower abs', s: '4', r: '12–15', rest: '45s', t: B, p: 0, note: 'Tuck pelvis.' }, { n: 'Cable crunch', m: 'Upper abs', s: '3', r: '15', rest: '45s', t: I, p: 0, note: 'Add weight weekly.' } ], cd: 'Arm stretches' }
        ]
      }
    };

    // Parser for timers
    const parseTime = (str) => {
      if (!str) return 0;
      let s = 0;
      if (str.includes('-')) {
        const match = str.split('-')[1].match(/(\d+)/);
        if (match) s = parseInt(match[1]);
      } else {
        const mMatch = str.match(/(\d+)\s*m/i);
        if (mMatch) s += parseInt(mMatch[1]) * 60;
        const sMatch = str.match(/(\d+)\s*s/i);
        if (sMatch) s += parseInt(sMatch[1]);
      }
      return s;
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      const [activePlanId, setActivePlanId] = useState('s4');
      const [expandedDays, setExpandedDays] = useState(['D1']);
      const [searchQuery, setSearchQuery] = useState('');
      
      // Local Storage States
      const [completedEx, setCompletedEx] = useState({});
      const [notes, setNotes] = useState({});
      const [loaded, setLoaded] = useState(false);

      // Timer State
      const [timer, setTimer] = useState({ active: false, left: 0, init: 0, label: '', run: false });
      const timerRef = useRef(null);

      // Initialization - Load from Local Storage
      useEffect(() => {
        try {
          const saved = localStorage.getItem('tojiWorkoutApp');
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.completed) setCompletedEx(parsed.completed);
            if (parsed.notes) setNotes(parsed.notes);
          }
        } catch (e) { console.error("Could not load data", e); }
        setLoaded(true);
      }, []);

      // Save to Local Storage on change
      useEffect(() => {
        if (loaded) {
          localStorage.setItem('tojiWorkoutApp', JSON.stringify({ completed: completedEx, notes }));
        }
      }, [completedEx, notes, loaded]);

      // Timer Effect
      useEffect(() => {
        if (timer.run && timer.left > 0) {
          timerRef.current = setTimeout(() => setTimer(p => ({ ...p, left: p.left - 1 })), 1000);
        } else if (timer.left === 0 && timer.active) {
          setTimer(p => ({ ...p, run: false }));
        }
        return () => clearTimeout(timerRef.current);
      }, [timer]);

      const plan = PL[activePlanId];

      const toggleDay = (d) => setExpandedDays(p => p.includes(d) ? p.filter(id => id !== d) : [...p, d]);
      const toggleEx = (dId, eIdx) => {
        const k = `${activePlanId}-${dId}-${eIdx}`;
        setCompletedEx(p => ({ ...p, [k]: !p[k] }));
      };
      
      const updateNote = (dId, text) => {
        setNotes(p => ({ ...p, [`${activePlanId}-${dId}`]: text }));
      };

      const startTimer = (tStr, lbl, e) => {
        e.stopPropagation();
        const sec = parseTime(tStr);
        if (sec > 0) setTimer({ active: true, left: sec, init: sec, label: lbl, run: true });
      };

      const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

      // Progress calculation
      const getDayProgress = (dId, total) => {
        let c = 0;
        for (let i = 0; i < total; i++) if (completedEx[`${activePlanId}-${dId}-${i}`]) c++;
        return Math.round((c / total) * 100) || 0;
      };

      const getWeeklyProgress = () => {
        let t = 0, c = 0;
        plan.days.forEach(d => {
          t += d.ex.length;
          d.ex.forEach((_, i) => { if (completedEx[`${activePlanId}-${d.n}-${i}`]) c++; });
        });
        return { percent: Math.round((c / t) * 100) || 0, completed: c, total: t };
      };

      const weekly = getWeeklyProgress();

      // Get Type Style
      const getTypeStyle = (t) => {
        switch(t) {
          case C: return { i: Icons.Dumbbell, c: 'text-amber-400', b: 'bg-amber-950/40 border-amber-500/20', l: 'Compound' };
          case I: return { i: Icons.Activity, c: 'text-neutral-400', b: 'bg-toji-border/40 border-neutral-700', l: 'Isolation' };
          case B: return { i: Icons.Bodyweight, c: 'text-blue-400', b: 'bg-blue-950/40 border-blue-500/20', l: 'Bodyweight' };
          default: return { i: Icons.Activity, c: 'text-neutral-400', b: 'bg-toji-border border-neutral-700', l: 'Machine' };
        }
      };

      // Filtering days based on search
      const visibleDays = plan.days.map(d => {
        if (!searchQuery) return { ...d, visibleEx: d.ex, isVisible: true };
        const q = searchQuery.toLowerCase();
        const visibleEx = d.ex.filter(e => e.n.toLowerCase().includes(q) || e.m.toLowerCase().includes(q));
        return { ...d, visibleEx, isVisible: visibleEx.length > 0 || d.t.toLowerCase().includes(q) };
      }).filter(d => d.isVisible);

      if (!loaded) return null;

      return (
        <div className="min-h-screen p-4 md:p-8 pb-32 max-w-5xl mx-auto space-y-8 font-sans relative">
          
          {/* Header */}
          <header className="text-center py-6 border-b border-toji-border space-y-3 relative">
            <h1 className="text-3xl md:text-5xl font-black tracking-widest text-toji-gold uppercase drop-shadow-[0_0_15px_rgba(201,168,76,0.2)]">
              Vicky × Toji
            </h1>
            <p className="text-xs md:text-sm text-toji-muted uppercase tracking-[0.2em] font-semibold">
              Premium Workout Master · Lean Bulk
            </p>
          </header>

          {/* Top Dashboard: Rules & Weekly Progress */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <div className="md:col-span-2 glass border border-toji-gold/20 rounded-2xl p-5 shadow-[0_0_20px_rgba(201,168,76,0.05)] relative overflow-hidden">
              <div className="absolute top-0 right-0 p-4 opacity-10 text-toji-gold pointer-events-none">
                {Icons.Shield}
              </div>
              <div className="flex items-center gap-2 mb-4">
                <span className="text-toji-gold">{Icons.Shield}</span>
                <h2 className="text-sm font-bold text-toji-gold uppercase tracking-widest">Master Rules</h2>
              </div>
              <ul className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-2 text-xs md:text-sm text-neutral-400">
                {["Lateral delts are #1 — 8-10 sets/week min.", "Upper chest FIRST in every push session.", "+350-450 kcal/day surplus mandatory.", "2-rep rule: leave only 1-2 reps in tank.", "Progressive overload on strict form only.", "APT fix: daily glute bridges & hip stretch.", "Protein: 1.6-2g/kg daily (Eggs/Soya/Dal).", "Deload every 6-8 weeks (60% weight)."].map((r, i) => (
                  <li key={i} className="flex gap-2 items-start"><span className="text-toji-gold/60">→</span><span>{r}</span></li>
                ))}
              </ul>
            </div>

            <div className="glass border border-toji-border rounded-2xl p-5 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-neutral-400 uppercase tracking-widest mb-4">Weekly Progress</h3>
              <div className="flex items-end justify-between mb-2">
                <span className="text-4xl font-black text-white">{weekly.percent}%</span>
                <span className="text-sm text-neutral-500 font-medium mb-1">{weekly.completed} / {weekly.total} Ex</span>
              </div>
              <div className="h-2 w-full bg-neutral-900 rounded-full overflow-hidden">
                <div className="h-full bg-toji-gold transition-all duration-1000 ease-out" style={{ width: `${weekly.percent}%` }}></div>
              </div>
              <p className="text-xs text-neutral-500 mt-4 italic">Progress auto-saves locally.</p>
            </div>
          </div>

          {/* Controls: Tabs & Search */}
          <div className="flex flex-col md:flex-row gap-4 items-center justify-between bg-toji-panel p-2 rounded-xl border border-toji-border">
            <div className="flex w-full md:w-auto overflow-x-auto hide-scrollbar gap-1">
              {Object.entries({ s4: 'Split (4)', s5: 'Split (5)', b4: 'Body (4)', b5: 'Body (5)' }).map(([k, l]) => (
                <button key={k} onClick={() => { setActivePlanId(k); setExpandedDays([PL[k].days[0].n]); setSearchQuery(''); }}
                  className={`py-2 px-4 rounded-lg text-xs md:text-sm font-bold tracking-wide whitespace-nowrap transition-all duration-300
                    ${activePlanId === k ? 'bg-toji-gold/15 text-toji-gold shadow-[0_0_15px_rgba(201,168,76,0.15)] border border-toji-gold/30' : 'text-neutral-500 hover:text-neutral-300 hover:bg-white/5 border border-transparent'}`}>
                  {l}
                </button>
              ))}
            </div>
            
            <div className="relative w-full md:w-64">
              <div className="absolute inset-y-0 left-3 flex items-center text-neutral-500 pointer-events-none">{Icons.Search}</div>
              <input type="search" placeholder="Search exercises..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                className="w-full bg-neutral-950 border border-toji-border rounded-lg py-2 pl-10 pr-4 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-toji-gold/50 transition-colors hide-search" />
            </div>
          </div>

          {/* Schedule Summary */}
          <div className="grid grid-cols-4 md:grid-cols-7 gap-2">
            {plan.sc.map((d, i) => (
              <div key={i} className={`p-2 rounded-xl border flex flex-col items-center text-center transition-colors ${d.g ? 'bg-toji-gold/5 border-toji-gold/20' : 'bg-toji-panel border-toji-border opacity-50'}`}>
                <span className="text-[10px] font-bold text-neutral-500 uppercase">{d.d}</span>
                <span className={`text-xs md:text-sm font-bold mt-1 ${d.g ? 'text-toji-gold' : 'text-neutral-400'}`}>{d.t}</span>
              </div>
            ))}
          </div>

          {/* Days Accordion */}
          <div className="space-y-4">
            {visibleDays.map((d) => {
              const exp = expandedDays.includes(d.n) || searchQuery.length > 0;
              const prog = getDayProgress(d.n, d.ex.length);
              
              return (
                <div key={d.n} className={`glass border rounded-2xl overflow-hidden transition-all duration-300 ${exp ? 'border-toji-gold/30 shadow-[0_4px_30px_rgba(0,0,0,0.5)]' : 'border-toji-border hover:border-neutral-700'}`}>
                  
                  {/* Header */}
                  <div onClick={() => toggleDay(d.n)} className="p-4 md:p-5 flex items-center justify-between cursor-pointer group">
                    <div className="flex items-center gap-4 flex-1">
                      <span className="bg-toji-gold/10 text-toji-gold border border-toji-gold/20 px-3 py-1 rounded-full text-xs font-bold shrink-0">{d.n}</span>
                      <div>
                        <h3 className="text-base md:text-lg font-bold text-white group-hover:text-toji-gold transition-colors">{d.t}</h3>
                        <p className="text-xs text-neutral-500 font-medium">{d.s}</p>
                      </div>
                      
                      <div className="hidden md:flex items-center gap-3 flex-1 max-w-[150px] ml-auto mr-4">
                        <div className="h-1.5 flex-1 bg-neutral-900 rounded-full"><div className="h-full bg-toji-gold transition-all" style={{width: `${prog}%`}}></div></div>
                        <span className="text-[10px] font-bold text-neutral-500">{prog}%</span>
                      </div>
                    </div>
                    <div className="text-neutral-500 group-hover:text-toji-gold transition-colors">{exp ? Icons.ChevronUp : Icons.ChevronDown}</div>
                  </div>

                  {!exp && <div className="h-0.5 w-full bg-neutral-900 md:hidden"><div className="h-full bg-toji-gold" style={{width: `${prog}%`}}></div></div>}

                  {/* Body */}
                  {exp && (
                    <div className="p-4 md:p-5 pt-0 border-t border-white/5">

                        <span className="text-orange-500 mt-0.5">{Icons.Flame}</span>
                        <div><span className="text-[10px] font-bold text-orange-500 uppercase tracking-widest block mb-1">Warm-Up</span><p className="text-sm text-neutral-300">{d.wu}</p></div>
                      </div>

                      {/* Exercises */}
                      <div className="space-y-3">
                        {d.visibleEx.map((ex, eIdx) => {
                          // Find original index to maintain proper completion state during search
                          const origIdx = d.ex.findIndex(e => e.n === ex.n);
                          const isComp = completedEx[`${activePlanId}-${d.n}-${origIdx}`];
                          const tStyle = getTypeStyle(ex.t);
                          const hasTimer = parseTime(ex.r) > 0;
                          
                          return (
                            <div key={origIdx} onClick={() => toggleEx(d.n, origIdx)} 
                              className={`group relative p-4 md:p-5 rounded-xl border transition-all duration-300 cursor-pointer overflow-hidden
                              ${isComp ? 'bg-black/40 border-neutral-800/50 opacity-60' : 'bg-neutral-950 border-toji-border hover:border-toji-gold/40 hover:bg-[#0a0a0a]'}`}>
                              
                              <div className="flex flex-col md:flex-row gap-4 md:gap-6 md:items-center">
                                
                                {/* Check & Titles */}
                                <div className="flex items-start gap-4 flex-1">
                                  <button className={`mt-0.5 transition-colors ${isComp ? 'text-toji-gold drop-shadow-[0_0_8px_rgba(201,168,76,0.6)]' : 'text-neutral-700 group-hover:text-toji-gold/50'}`}>
                                    {isComp ? Icons.CheckCircle : Icons.Circle}
                                  </button>
                                  <div className="flex-1">
                                    <div className="flex flex-wrap items-center gap-2 mb-1">
                                      <h4 className={`font-bold text-base md:text-lg ${isComp ? 'line-through text-neutral-600' : 'text-white'}`}>{ex.n}</h4>
                                      {ex.p === 1 && (
                                        <span className="inline-flex items-center gap-1 bg-toji-gold/10 text-toji-gold border border-toji-gold/30 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest animate-glow">
                                          {Icons.Star} Priority
                                        </span>
                                      )}
                                    </div>
                                    <p className="text-xs md:text-sm text-toji-muted font-medium">{ex.m}</p>
                                    <p className="text-xs text-neutral-400 mt-3 md:hidden italic border-l-2 border-neutral-800 pl-2">{ex.note}</p>
                                  </div>
                                </div>

                                {/* Metrics & Type */}
                                <div className={`flex flex-wrap items-center gap-3 md:gap-6 pl-9 md:pl-0 ${isComp ? 'opacity-50' : ''}`}>
                                  <div className={`hidden md:flex items-center gap-1.5 px-3 py-1 rounded-lg border ${tStyle.b} ${tStyle.c}`}>
                                    {tStyle.i} <span className="text-[10px] font-bold uppercase tracking-wider">{tStyle.l}</span>
                                  </div>

                                  <div className="flex items-center justify-between w-full md:w-auto gap-4 md:gap-6 bg-toji-panel md:bg-transparent p-3 md:p-0 rounded-xl border border-toji-border md:border-none">
                                    <div className="text-center min-w-[32px]"><span className="block text-[9px] text-neutral-500 uppercase font-bold mb-1">Sets</span><span className="text-sm font-bold text-white">{ex.s}</span></div>
                                    <div className="w-px h-8 bg-neutral-800"></div>
                                    
                                    <div className="text-center min-w-[48px] flex items-center justify-center gap-1">
                                      <div><span className="block text-[9px] text-neutral-500 uppercase font-bold mb-1">Reps</span><span className="text-sm font-bold text-toji-gold">{ex.r}</span></div>
                                      {hasTimer && !isComp && (
                                        <button onClick={(e) => startTimer(ex.r, `${ex.n} (Hold)`, e)} className="p-1.5 bg-neutral-800 hover:bg-toji-gold/20 text-neutral-400 hover:text-toji-gold rounded transition-colors" title="Start Rep Timer">{Icons.Play}</button>
                                      )}
                                    </div>
                                    
                                    <div className="w-px h-8 bg-neutral-800"></div>
                                    <div className="text-center min-w-[48px] flex items-center justify-center gap-1">
                                      <div><span className="block text-[9px] text-neutral-500 uppercase font-bold mb-1">Rest</span><span className="text-sm font-medium text-neutral-300">{ex.rest}</span></div>
                                      {!isComp && (
                                        <button onClick={(e) => startTimer(ex.rest, `Rest: ${ex.n}`, e)} className="p-1.5 bg-neutral-800 hover:bg-toji-gold/20 text-neutral-400 hover:text-toji-gold rounded transition-colors" title="Start Rest Timer">{Icons.Timer}</button>
                                      )}
                                    </div>
                                  </div>
                                </div>
                              </div>
                              <div className="hidden md:flex items-start gap-2 mt-3 pl-9">
                                <span className="text-neutral-600 mt-0.5">{Icons.Edit}</span>
                                <p className={`text-xs md:text-sm font-medium ${isComp ? 'text-neutral-600' : 'text-neutral-400'}`}>{ex.note}</p>
                              </div>
                            </div>
                          );
                        })}
                        {d.visibleEx.length === 0 && <div className="text-center py-4 text-neutral-500 text-sm">No exercises match your search.</div>}
                      </div>

                      {/* Cool Down */}
                      <div className="bg-neutral-950/50 rounded-xl p-4 mt-6 border-l-2 border-blue-500 flex gap-3 items-start">
                        <span className="text-blue-500 mt-0.5">{Icons.Snowflake}</span>
                        <div><span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest block mb-1">Cool-Down</span><p className="text-sm text-neutral-300">{d.cd}</p></div>
                      </div>

                      {/* Notes Section */}
                      <div className="mt-4 pt-4 border-t border-white/5 relative">
                        <div className="absolute top-6 left-3 text-neutral-600">{Icons.Edit}</div>
                        <textarea 
                          placeholder={`Add personal notes for ${d.n}... (Saves automatically)`}
                          value={notes[`${activePlanId}-${d.n}`] || ''}
                          onChange={(e) => updateNote(d.n, e.target.value)}
                          className="w-full bg-neutral-950/50 border border-toji-border rounded-xl py-3 pl-10 pr-4 text-sm text-neutral-300 placeholder-neutral-700 focus:outline-none focus:border-toji-gold/50 transition-colors resize-y min-h-[80px]"
                        />
                      </div>

                    </div>
                  )}
                </div>
              );
            })}
          </div>
          
          {/* Floating Smart Timer */}
          {timer.active && (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-sm rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.8)] overflow-hidden backdrop-blur-xl border transition-all duration-300 ${timer.left === 0 ? 'bg-toji-gold border-white text-black animate-pulse' : 'bg-black/80 border-toji-gold/40'}`}>
              <div className="p-4 md:p-5 flex items-center justify-between">
                <div className="flex flex-col">
                  <span className={`text-[10px] uppercase font-bold tracking-widest ${timer.left === 0 ? 'text-black/60' : 'text-toji-gold'}`}>{timer.label}</span>
                  <span className={`text-4xl font-mono font-black tracking-tighter ${timer.left === 0 ? 'text-black' : 'text-white'}`}>{formatTime(timer.left)}</span>
                </div>
                
                <div className="flex items-center gap-2">
                  {timer.left > 0 ? (
                    <>
                      <button onClick={() => setTimer(p => ({...p, run: !p.run}))} className="p-3.5 rounded-full bg-neutral-800 hover:bg-neutral-700 text-toji-gold transition-colors shadow-inner">
                        {timer.run ? Icons.Pause : Icons.Play}
                      </button>
                      <button onClick={() => setTimer(p => ({...p, left: p.init, run: false}))} className="p-2.5 rounded-full text-neutral-400 hover:text-white hover:bg-neutral-800 transition-colors">
                        {Icons.Reset}
                      </button>
                    </>
                  ) : <span className="px-4 py-1.5 bg-black/20 rounded-full text-sm font-bold mr-2 uppercase tracking-wide">Done!</span>}
                  
                  <button onClick={() => setTimer({active:false,left:0,init:0,label:'',run:false})} className={`p-2.5 rounded-full transition-colors ${timer.left === 0 ? 'hover:bg-black/20 text-black' : 'hover:bg-red-900/40 text-neutral-500 hover:text-red-400'}`}>
                    {Icons.X}
                  </button>
                </div>
              </div>
              
              {timer.left > 0 && (
                <div className="h-1.5 bg-neutral-900 w-full"><div className="h-full bg-toji-gold transition-all ease-linear" style={{ width: `${(timer.left / timer.init) * 100}%` }}/></div>
              )}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
